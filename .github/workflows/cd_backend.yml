name: Docker image build
on:
  push:
     branches:
      - master

  jobs:
    build: 
      name: Build docker image and push the repository.
      runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


  
      - name: login to docker hub.
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
  
    # PUSH THE CODE TO THE CONTAINER
      
      - name: Build and push
      - uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ajaysahani06/single-chat:latest

    # START THE CONTAINER.

      - name: deploying 
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            docker image pull ajaysahani06/single-chat:latest/flaskapp:latest
            docker container stop flask
            docker container rm flask
            docker container run -d --name single-chat -p 80:3000 ajaysahani06/simple-chat    
          ## make changes here. 


    
