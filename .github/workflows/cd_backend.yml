name: Docker image build
on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build docker image and push the repository.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: check the username
        run: echo "this is username ${{ secrets.DOCKER_USERNAME }} this is password ${{ secrets.DOCKERHUB_TOKEN }} this is url ${{ secrets.BASE_URL_BACKEND}}"

        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # PUSH THE CODE TO THE CONTAINER
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: ./http
          file: ./dockerfile/Dockerfile.backend
          push: true
          tags: in/single-chat-http:latest

      # START THE CONTAINER.
      - name: Deploying
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            docker image pull ajaysahani06/single-chat-http:latest
            docker container stop single-chat-http
            docker container rm single-chat-http
            docker container run -d --name single-chat-http -p 80:3001 ajaysahani06/single-chat-http:latest
